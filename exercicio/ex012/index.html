<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>hospedagem de videos</title>
</head>
<body>
    <h1>inserindo videos hospedados localmente</h1>
    <p>este video esta hospedado no meu propio servidor</p>
    <video width="560" poster="imagen/cpa-limao.png" controls autoplay loop>
<source src="midia/Meu-Video.mp4 (3).mp4" type="video/mp4" >
<source src="midia/Meu-Video.WEBM.webm" type="video/webm" >
<source src="midia/meu-video.m4v.mp4" type="video/m4v">
<source src="midia/meu-video.ogv" type="video/ogg" >
<p>seu navegador não tem compatibilidade com reprodução de videos.</p>
    </video>
    <h1>inserindo video do youtube</h1>
  <iframe width="560" height="315" src="https://www.youtube.com/embed/EbMvXiZq6HI?si=Xqg_8ebea5Uu-UmM" title="YouTube video player" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" referrerpolicy="strict-origin-when-cross-origin" allowfullscreen></iframe>
</body>
</html>
