<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>gradiente em CSS</title>
    <style>
        * { /* configuração globas das CSS */
            height: 100%;
        }
        body{
           
            background-image: linear-gradient(to right,#8703FB , #8703FB, #FC00D9, #FE0187, #FFC29C, #FF0644 ,  #FFBA00 , #FFC400  );
            background-attachment: fixed;
        }
    </style>
</head>
<body>
    <h1>testando gradiente</h1>
</body>
</html>
